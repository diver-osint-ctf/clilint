name: CTF Challenges YAML Linter

# このファイルはユーザー向けのサンプルワークフローです
# あなたのリポジトリにコピーして使用してください

on:
  # PRの作成時
  pull_request:
    types: [opened]

  # PR内で "@github clilint" とコメントした場合
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint-challenges:
    # PRまたは特定のコメントの場合のみ実行
    # issue_commentはリポジトリメンバー/コラボレーターのみ許可
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@github clilint') &&
       (github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'))

    runs-on: ubuntu-latest
    name: Lint CTF Challenges YAML

    steps:
      - name: Set PR number
        id: pr_number
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_EVENT_NUMBER: ${{ github.event.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "PR_NUMBER=$PR_EVENT_NUMBER" >> $GITHUB_ENV
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            echo "PR_NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV
          fi

      - name: Get Branch
        id: get_branch
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "BRANCH_NAME=$HEAD_REF" >> $GITHUB_ENV
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            BRANCH_NAME=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName --repo "$GH_REPO")
            echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BRANCH_NAME }}
      
      # CTF Challenges YAML Linter アクションを実行
      # 変更されたディレクトリの検出とlintingはアクション内で自動実行
      - name: Run CTF Challenges YAML Linter
        id: linter
        uses: diver-osint-ctf/clilint@d02e012995c95181e923e9ebced38271ceaea5dd # v1.1.0
        with:
          repository: ${{ github.repository }}
          pr-number: ${{ env.PR_NUMBER }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
